  <style>
  :root{
    --cream:#f5efe6;--gold:#b8860b;--gold-light:#d4a52a;
    --gold-pale:#e8c96a;--forest:#4a6741;--forest-dark:#3a5232;
    --text:#2d2520;--text-light:#5a4a3a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--cream);font-family:'Cormorant Garamond',serif;color:var(--text);overflow-x:hidden;}

  /* ── LANDING ── */
  #landing{
    position:fixed;inset:0;background:#fffdf8;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:200;cursor:pointer;
    transition:opacity 0.9s ease,visibility 0.9s ease;
  }
  #landing.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .env-wrap{position:relative;width:min(400px,86vw);animation:floatEnv 3.5s ease-in-out infinite;}
  @keyframes floatEnv{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  .env-wrap img{width:100%;filter:drop-shadow(0 20px 60px rgba(0,0,0,0.12));transition:transform 0.3s,filter 0.3s;}
  #landing:hover .env-wrap img{transform:scale(1.04);filter:drop-shadow(0 28px 70px rgba(184,134,11,0.22));}
  .click-hint{font-family:'Great Vibes',cursive;font-size:clamp(1.4rem,4vw,2.2rem);color:var(--gold);margin-top:20px;animation:pulse 2.2s ease-in-out infinite;text-shadow:0 2px 14px rgba(184,134,11,0.2);}
  @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
  .ripple{position:absolute;border-radius:50%;background:rgba(184,134,11,0.15);transform:scale(0);animation:rAnim 0.75s ease-out forwards;pointer-events:none;}
  @keyframes rAnim{to{transform:scale(5);opacity:0;}}

  /* ── PAGE FLASH ── */
  #pt{position:fixed;inset:0;background:#fffdf8;z-index:150;pointer-events:none;opacity:0;transition:opacity 0.35s;}
  #pt.flash{opacity:1;}

  /* ── SCROLL PROGRESS ── */
  #sp{position:fixed;top:0;left:0;height:2.5px;background:linear-gradient(90deg,var(--gold),#f0d060);z-index:999;width:0%;display:none;}
  #sp.show{display:block;}

  /* ── NAV DOTS ── */
  #nav-dots{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:none;flex-direction:column;gap:10px;z-index:50;}
  .nd{width:8px;height:8px;border-radius:50%;background:rgba(184,134,11,0.25);cursor:pointer;border:none;transition:all 0.3s;outline:none;}
  .nd.active{background:var(--gold);transform:scale(1.55);box-shadow:0 0 8px rgba(184,134,11,0.4);}

  /* ── MUSIC BTN ── */
  #mbtn{position:fixed;bottom:76px;right:14px;z-index:60;width:44px;height:44px;border-radius:50%;background:rgba(255,253,248,0.92);border:1.5px solid var(--gold-pale);display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.1);transition:transform 0.25s;font-size:1.1rem;}
  #mbtn.show{display:flex;}
  #mbtn:hover{transform:scale(1.12);}

  /* ── COUNTDOWN ── */
  #cd{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,248,0.93);backdrop-filter:blur(10px);border-top:1px solid rgba(184,134,11,0.18);display:none;justify-content:center;gap:clamp(12px,4vw,44px);padding:10px 16px 14px;z-index:40;}
  #cd.show{display:flex;}
  .cdu{text-align:center;}
  .cdn{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,4vw,1.9rem);font-weight:300;color:var(--gold);line-height:1;}
  .cdl{font-family:'Cinzel',serif;font-size:0.5rem;letter-spacing:0.2em;color:var(--text-light);text-transform:uppercase;margin-top:2px;}
  .cds{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold-pale);align-self:flex-start;padding-top:3px;}

  /* ── CONTENT ── */
  #content{opacity:0;transform:translateY(24px);transition:opacity 0.9s ease 0.15s,transform 0.9s ease 0.15s;}
  #content.visible{opacity:1;transform:none;}

  /* ── SECTIONS ── */
  section{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;}
  .sec-img{width:100%;max-width:600px;display:block;margin:0 auto;object-fit:contain;}

  /* ── FADE IN ── */
  .fi{opacity:0;transform:translateY(28px);transition:opacity 0.8s ease,transform 0.8s ease;}
  .fi.visible{opacity:1;transform:none;}
  .fi.d1{transition-delay:0.18s;}

  /* ── BOTÕES ── */
  .btn-wrap{
    width:100%;max-width:600px;
    background:transparent;
    display:flex;justify-content:center;
    padding:22px 16px 32px;
  }
  .btn-green{
    display:inline-flex;align-items:center;gap:8px;
    padding:13px 32px;
    background:#8B6914;color:#fff;
    font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.22em;
    text-decoration:none;text-transform:uppercase;border-radius:2px;
    box-shadow:0 4px 18px rgba(139,105,20,0.35);
    transition:background 0.25s,transform 0.2s,box-shadow 0.2s;
  }
  .btn-green:hover{background:var(--gold);transform:translateY(-3px);box-shadow:0 8px 26px rgba(184,134,11,0.45);}

  /* ── FOOTER ── */
  footer{background:#fffdf8;text-align:center;padding:40px 20px 90px;border-top:1px solid rgba(184,134,11,0.12);}
  </style>
  </head>
  <body>

  <div id="pt"></div>
  <div id="sp"></div>

  <!-- ENVELOPE FECHADO — tela inicial -->
  <div id="landing" onclick="openInvite(event)">
    <div class="env-wrap">
      <img src="imgs/capa.png" alt="Envelope">
    </div>
    <p class="click-hint">✦ Toque para abrir ✦</p>
  </div>

  <button id="mbtn" onclick="toggleMusic()">🎵</button>

  <nav id="nav-dots">
    <button class="nd active" onclick="go('s1')" title="Capa"></button>
    <button class="nd" onclick="go('s2')" title="Convite"></button>
    <button class="nd" onclick="go('s3')" title="RSVP"></button>
    <button class="nd" onclick="go('s4')" title="Local"></button>
    <button class="nd" onclick="go('s5')" title="Manual"></button>
    <button class="nd" onclick="go('s6')" title="Dress Code"></button>
  </nav>

  <div id="cd">
    <div class="cdu"><div class="cdn" id="cd-d">--</div><div class="cdl">Dias</div></div>
    <div class="cds">·</div>
    <div class="cdu"><div class="cdn" id="cd-h">--</div><div class="cdl">Horas</div></div>
    <div class="cds">·</div>
    <div class="cdu"><div class="cdn" id="cd-m">--</div><div class="cdl">Min</div></div>
    <div class="cds">·</div>
    <div class="cdu"><div class="cdn" id="cd-s">--</div><div class="cdl">Seg</div></div>
  </div>

  <div id="content">

    <!-- S1: Envelope aberto / capa do convite -->
    <section id="s1">
      <img class="sec-img fi" src="imgs/img2.png" alt="Capa">
    </section>

    <!-- S2: RSVP (era img3) — AGORA É A SEGUNDA -->
    <section id="s2">
      <img class="sec-img fi" src="imgs/img3.png" alt="RSVP">
    </section>

    <!-- S3: Convite principal (era img2) — AGORA É A TERCEIRA -->
    <!-- Botão "Confirmar Presença" fica ABAIXO desta imagem -->
    <section id="s3">
      <img class="sec-img fi" src="imgs/img4.png" alt="Convite">
    </section>
    <div class="btn-wrap fi d1">
      <a href="https://sites.wedy.com/casamento-vanessa-e-marysson" target="_blank" class="btn-green">
        ✦ Confirmar Presença &amp; Presentes
      </a>
    </div>

    <!-- S4: Localização -->
    <section id="s4">
      <img class="sec-img fi" src="imgs/img5.png" alt="Localização">
    </section>
    <!-- Botão "Ver no Mapa" fica ABAIXO desta imagem -->
    <div class="btn-wrap fi d1"> 
        <a href="https://maps.google.com/?q=Pousada+Mini+Farm+Luziania+Goias" target="_blank" class="btn-green"> 
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"> 
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/> </svg> 
            Ver no Mapa 
          </a>
          </div>
  

    <!-- S5: Manual dos Convidados -->
    <section id="s5">
      <img class="sec-img fi" src="imgs/img7.png" alt="Manual dos Convidados">
    </section>
      

    <!-- S6: Dress Code -->
    <section id="s6">
      <img class="sec-img fi" src="imgs/img6.png" alt="Dress Code">
    </section>

    <footer>
      <p style="font-family:'Great Vibes',cursive;font-size:clamp(2.2rem,6vw,3.2rem);color:var(--gold);">Vanessa &amp; Máryson</p>
      <p style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.28em;color:var(--text-light);margin-top:10px;text-transform:uppercase;">11 · Julho · 2026 · Pousada Mini Farm</p>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;color:var(--gold-light);margin-top:10px;">Com muito amor ✦</p>
    </footer>

  </div><!-- /#content -->

  <script>
  // ── SOM DE ENVELOPE ──
  function playEnvSound(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const sr=ctx.sampleRate,dur=1.6;
      const buf=ctx.createBuffer(1,sr*dur,sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr;
        let env=t<0.04?t/0.04:t<0.25?1-(t-0.04)/0.7:Math.max(0,0.65-(t-0.25)/1.1);
        d[i]=((Math.random()*2-1)*0.5+Math.sin(2*Math.PI*160*t)*0.18*Math.exp(-t*5)+Math.sin(2*Math.PI*340*t)*0.1*Math.exp(-t*3.5))*env*0.72;
      }
      const src=ctx.createBufferSource();src.buffer=buf;
      const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=700;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=5500;
      const g=ctx.createGain();g.gain.value=0.85;
      src.connect(hp);hp.connect(lp);lp.connect(g);g.connect(ctx.destination);
      src.start();
    }catch(e){}
  }

  // ── MÚSICA AMBIENTE ──
  let aCtx=null,musicOn=false;
  function startAmbient(){
    try{
      aCtx=new(window.AudioContext||window.webkitAudioContext)();
      const mg=aCtx.createGain();mg.gain.value=0;mg.connect(aCtx.destination);
      mg.gain.linearRampToValueAtTime(0.1,aCtx.currentTime+4);
      const rev=aCtx.createConvolver();
      const rLen=aCtx.sampleRate*1.5;
      const rBuf=aCtx.createBuffer(2,rLen,aCtx.sampleRate);
      for(let c=0;c<2;c++){const rd=rBuf.getChannelData(c);for(let i=0;i<rLen;i++)rd[i]=(Math.random()*2-1)*Math.pow(1-i/rLen,2);}
      rev.buffer=rBuf;
      const rg=aCtx.createGain();rg.gain.value=0.35;rev.connect(rg);rg.connect(mg);
      const notes=[311.13,349.23,391.99,466.16,523.25,466.16,391.99,349.23,311.13,391.99];
      const nd=2.0;
      function sched(t0){
        notes.forEach((f,i)=>{
          const t=t0+i*nd;
          const o=aCtx.createOscillator();o.type='sine';o.frequency.value=f;
          const o2=aCtx.createOscillator();o2.type='sine';o2.frequency.value=f*2.005;
          const ng=aCtx.createGain();
          ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(0.055,t+0.4);ng.gain.linearRampToValueAtTime(0,t+nd*0.88);
          [o,o2].forEach(x=>{x.connect(ng);x.start(t);x.stop(t+nd);});
          ng.connect(mg);ng.connect(rev);
        });
      }
      const cy=notes.length*nd;
      for(let i=0;i<30;i++)sched(aCtx.currentTime+1+i*cy);
      musicOn=true;
    }catch(e){}
  }
  function toggleMusic(){
    const btn=document.getElementById('mbtn');
    if(!musicOn){startAmbient();btn.textContent='🎶';}
    else{if(aCtx)aCtx.suspend();btn.textContent='🎵';musicOn=false;}
  }

  // ── RIPPLE ──
  function ripple(e,el){
    const r=el.getBoundingClientRect();
    const x=(e.clientX||r.left+r.width/2)-r.left;
    const y=(e.clientY||r.top+r.height/2)-r.top;
    const sz=Math.max(r.width,r.height)*0.6;
    const d=document.createElement('div');
    d.className='ripple';
    d.style.cssText=`left:${x-sz/2}px;top:${y-sz/2}px;width:${sz}px;height:${sz}px;`;
    el.appendChild(d);setTimeout(()=>d.remove(),800);
  }

  // ── ABRIR CONVITE ──
  function openInvite(e){
    const land=document.getElementById('landing');
    ripple(e,land);
    playEnvSound();
    document.getElementById('pt').classList.add('flash');
    setTimeout(()=>{
      land.classList.add('hidden');
      document.getElementById('pt').classList.remove('flash');
      document.getElementById('content').classList.add('visible');
      document.getElementById('nav-dots').style.display='flex';
      document.getElementById('cd').classList.add('show');
      document.getElementById('sp').classList.add('show');
      document.getElementById('mbtn').classList.add('show');
      observeFI();watchSections();
      tick();setInterval(tick,1000);
      startAmbient();document.getElementById('mbtn').textContent='🎶';
    },300);
  }

  // ── SCROLL PROGRESS ──
  window.addEventListener('scroll',()=>{
    const sp=document.getElementById('sp');
    if(!sp.classList.contains('show'))return;
    const h=document.documentElement;
    sp.style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%';
  });

  // ── FADE IN ──
  function observeFI(){
    const o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.1});
    document.querySelectorAll('.fi').forEach(el=>o.observe(el));
  }

  // ── NAV ──
  function go(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'});}
  function watchSections(){
    const ids=['s1','s2','s3','s4','s5','s6'];
    const dots=document.querySelectorAll('.nd');
    const o=new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting){const i=ids.indexOf(e.target.id);if(i>=0)dots.forEach((d,j)=>d.classList.toggle('active',i===j));}
    }),{threshold:0.45});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)o.observe(el);});
  }

  // ── CONTAGEM REGRESSIVA ──
  function tick(){
    const w=new Date('2026-07-11T16:30:00-03:00')-new Date();
    if(w<=0){['cd-d','cd-h','cd-m','cd-s'].forEach(id=>document.getElementById(id).textContent='🎉');return;}
    const dd=Math.floor(w/86400000),hh=Math.floor(w%86400000/3600000),mm=Math.floor(w%3600000/60000),ss=Math.floor(w%60000/1000);
    const pad=n=>String(n).padStart(2,'0');
    document.getElementById('cd-d').textContent=pad(dd);
    document.getElementById('cd-h').textContent=pad(hh);
    document.getElementById('cd-m').textContent=pad(mm);
    document.getElementById('cd-s').textContent=pad(ss);
  }
  </script>
  </body>
